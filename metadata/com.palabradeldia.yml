AutoName: Palabra de Hoy

Description: |-
    Word of the day app (Palabra de Hoy) using a dictionary derived from the Real Academia
    Española corpus (via github.com/eneko98/RAE-Corpus). One word per day,
    same for all users — date is used as a deterministic seed so no server
    is needed. No network permission requested.

    The dictionary JSON is pre-generated and included in the repo, so the
    build works without any extra steps.

    Favourites can be saved, exported and imported as JSON. Optional daily
    notification at 09:00 via WorkManager. Four themes including OLED.
    Material You on Android 12+.

